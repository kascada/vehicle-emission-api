<VirtualHost *:80>
    ServerName vehicle.akte.de
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8081/
    ProxyPassReverse / http://127.0.0.1:8081/
</VirtualHost>

<VirtualHost *:443>
    ServerName vehicle.akte.de
    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/akte/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/akte/privkey.pem
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8081/
    ProxyPassReverse / http://127.0.0.1:8081/
</VirtualHost>
